<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 500" width="200" height="500">
  <defs>
    <linearGradient id="manqM" x1="0" y1="0" x2="1" y2="0.1">
      <stop offset="0" stop-color="#fbf6ec"/>
      <stop offset="0.45" stop-color="#efe6d3"/>
      <stop offset="1" stop-color="#c9bca0"/>
    </linearGradient>
    <radialGradient id="hiM" cx="0.3" cy="0.25" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="shM" cx="0.7" cy="0.7" r="0.6">
      <stop offset="0" stop-color="#7d6f55" stop-opacity="0"/>
      <stop offset="1" stop-color="#7d6f55" stop-opacity="0.18"/>
    </radialGradient>
  </defs>

  <!-- Floor shadow -->
  <ellipse cx="100" cy="486" rx="58" ry="6" fill="#000" opacity="0.12"/>

  <!-- Pedestal base -->
  <ellipse cx="100" cy="478" rx="48" ry="6" fill="url(#manqM)"/>
  <rect x="96" y="430" width="8" height="50" fill="#9a8d76"/>

  <!-- Head (smooth, featureless) -->
  <ellipse cx="100" cy="50" rx="22" ry="30" fill="url(#manqM)"/>
  <ellipse cx="100" cy="50" rx="22" ry="30" fill="url(#hiM)"/>

  <!-- Neck -->
  <path d="M89 76 Q89 92 84 100 L116 100 Q111 92 111 76 Z" fill="url(#manqM)"/>

  <!-- Torso (broad shoulders → narrow waist → hips) -->
  <path d="M58 102
           Q34 108 32 132
           L42 210
           Q46 240 60 252
           Q56 290 62 322
           L138 322
           Q144 290 140 252
           Q154 240 158 210
           L168 132
           Q166 108 142 102 Z"
        fill="url(#manqM)"/>
  <!-- subtle highlight on torso -->
  <ellipse cx="78" cy="170" rx="22" ry="55" fill="url(#hiM)"/>
  <!-- subtle shading on right -->
  <ellipse cx="135" cy="220" rx="28" ry="70" fill="url(#shM)"/>

  <!-- Joint hints (mannequin seams) -->
  <path d="M56 248 Q100 252 144 248" stroke="#c9bca0" stroke-width="0.6" fill="none" opacity="0.55"/>
  <path d="M62 320 Q100 326 138 320" stroke="#c9bca0" stroke-width="0.6" fill="none" opacity="0.55"/>

  <!-- Left arm (slight gap from torso) -->
  <path d="M40 118 Q22 200 22 305 Q28 312 42 308 Q50 200 60 122 Z" fill="url(#manqM)"/>
  <ellipse cx="32" cy="200" rx="6" ry="60" fill="url(#hiM)"/>

  <!-- Right arm -->
  <path d="M160 118 Q178 200 178 305 Q172 312 158 308 Q150 200 140 122 Z" fill="url(#manqM)"/>
  <ellipse cx="170" cy="220" rx="6" ry="70" fill="url(#shM)"/>

  <!-- Left leg -->
  <path d="M65 322 Q60 400 72 432 L97 432 L100 324 Z" fill="url(#manqM)"/>
  <ellipse cx="78" cy="370" rx="8" ry="40" fill="url(#hiM)"/>

  <!-- Right leg -->
  <path d="M135 322 Q140 400 128 432 L103 432 L100 324 Z" fill="url(#manqM)"/>
  <ellipse cx="125" cy="380" rx="8" ry="40" fill="url(#shM)"/>
</svg>
